{% extends "layout.html" %}
{% block title %}Вход{% endblock %}

{% block login %}
<div class="container mt-5 d-flex justify-content-center">
  <div class="card text-center" style="width:400px">
    <div class="card-body">
      {% if error %}
          <p style="color:red">{{ error }}</p>
      {% endif %}
      <h4 class="card-title">Вход</h4>
      <form id="loginForm" method="post" action="/login">
        <p>Введите Telegram ID <strong>или</strong> Email и пароль</p>
        <input type="text" name="telegram_id" id="telegram_id" placeholder="Telegram ID (необязательно)"><br>
        <input type="email" name="email" id="email" placeholder="Email (необязательно)"><br>
        <input type="password" name="password" placeholder="Пароль" required><br>
        <button type="submit" class="btn btn-primary m-3">Войти</button>
      </form>
    </div>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(event) {
    const telegram = document.getElementById('telegram_id').value.trim();
    const email = document.getElementById('email').value.trim();
    if (telegram === '' && email === '') {
      alert('Пожалуйста, введите Telegram ID или Email');
      event.preventDefault();
    }
  });
</script>
{% endblock %}
