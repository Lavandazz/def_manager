
{% if user %}
<h3>Навигация</h3>
  {% if cases %}
    {% for case in cases %}
      <dl>
        <dt>{{ case.debtor }}</dt>
        <dd>
          <a href="/user/case/{{ case.id }}?page=1&size=10">{{ case.number_case }}</a>
        </dd>
      </dl>  
    {% endfor %}
  {% else %}
    <p>Дела не найдены.</p>
  {% endif %}

{% endif %}
