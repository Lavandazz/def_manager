services:
  redis:
      image: redis:alpine
      container_name: redis_def_manager
      env_file:
        - .env
      ports:
        - "6380:6379"
      restart: always
      command:
        - /bin/sh
        - -c
        - redis-server --requirepass ${REDIS_PASSWORD}
      volumes:
        - redis_data:/data
      deploy:
        resources:
          limits:
            memory: 64M
            cpus: '0.2'
      healthcheck:
        test: [ "CMD", "redis-cli", "ping" ]
        interval: 10s
        timeout: 5s

volumes:
  redis_data: